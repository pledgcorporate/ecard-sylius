services:

  php:
    build:
      context: ./.docker/php
    restart: unless-stopped
    volumes:
      - ./sylius_installation:/var/www/html:cached
    depends_on:
      - traefik
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:-change-me-in-production}
      DATABASE_URL: mysql://${DB_USER:-sylius}:${DB_PASSWORD:-sylius}@mariadb:3306/${DB_NAME:-sylius}?serverVersion=mariadb-11.0.0&charset=utf8mb4
      MAILER_DSN: smtp://mailer:1025
      DEFAULT_URI: https://${APP_DOMAIN:-sylius.docker}
      SYLIUS_VERSION: 2.2.0
    networks:
      - internal

  mariadb:
    image: mariadb:11
    restart: unless-stopped
    depends_on:
      - traefik
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-sylius}
      MYSQL_USER: ${DB_USER:-sylius}
      MYSQL_PASSWORD: ${DB_PASSWORD:-sylius}
    volumes:
      - db_data:/var/lib/mysql
      - db_log:/var/log/mysql
    networks:
      - traefik-net
      - internal

  mailer:
    image: axllent/mailpit
    restart: unless-stopped
    depends_on:
      - traefik
    networks:
      - traefik-net
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik-net}"
      - "traefik.http.routers.${APP_NAME:-sylius}-mail.rule=Host(`mail.${APP_DOMAIN:-sylius.docker}`)"
      - "traefik.http.routers.${APP_NAME:-sylius}-mail.entrypoints=websecure"
      - "traefik.http.routers.${APP_NAME:-sylius}-mail.tls=true"
      - "traefik.http.services.${APP_NAME:-sylius}-mail.loadbalancer.server.port=8025"

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    volumes:
      - ./sylius_installation:/var/www/html:cached
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
      - traefik
    networks:
      - traefik-net
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik-net}"
      # Main app
      - "traefik.http.routers.${APP_NAME:-sylius}.rule=Host(`${APP_DOMAIN:-sylius.docker}`)"
      - "traefik.http.routers.${APP_NAME:-sylius}.entrypoints=websecure"
      - "traefik.http.routers.${APP_NAME:-sylius}.tls=true"
      - "traefik.http.routers.${APP_NAME:-sylius}.middlewares=secure-headers@file"
      - "traefik.http.services.${APP_NAME:-sylius}.loadbalancer.server.port=80"

  traefik:
    image: ${TRAEFIK_IMAGE:-traefik:v3.6}
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Docker socket — read-only to minimise attack surface
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Static configuration
      - ./.docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      # Dynamic configuration directory (hot-reloaded)
      - ./.docker/traefik/dynamic:/etc/traefik/dynamic:ro
      # Local TLS certificates (generated by `make certs`)
      - ./.docker/traefik/certs:/etc/traefik/certs:ro
    networks:
      - traefik-net
    labels:
      - "traefik.enable=true"
      # Traefik dashboard — accessible at https://traefik.docker
      - "traefik.http.routers.dashboard.rule=Host(`traefik.docker`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=secure-headers@file"

volumes:
  db_data:
  db_log:

networks:
  traefik-net:
    name: ${TRAEFIK_NETWORK:-traefik-net}
    external: true
  internal:
    name: ${APP_NAME:-sylius}-net
